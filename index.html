<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Manager Final</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,Segoe UI;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
  color:white;
}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:100%;max-width:380px;padding:30px;border-radius:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:white}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:linear-gradient(135deg,#22d3ee,#3b82f6);color:white;font-weight:bold;cursor:pointer}
.link{text-align:center;margin-top:10px;cursor:pointer;opacity:0.8}
.hidden{display:none}
.container{max-width:900px;margin:auto;padding:20px}
.card2{background:rgba(0,0,0,0.3);padding:20px;border-radius:15px;margin-bottom:15px}
table{width:80%;margin:auto;border-collapse:collapse;text-align:center}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
th{color:#9ca3af}
.profit{color:#22c55e}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22d3ee,#3b82f6);padding:12px 18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <div class="link" onclick="showRegister()">Belum punya akun? Daftar</div>
  </div>
</div>

<!-- REGISTER -->
<div id="registerPage" class="center hidden">
  <div class="card">
    <h2>Register</h2>
    <input id="emailReg" placeholder="Email">
    <input id="passReg" type="password" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <div class="link" onclick="showLogin()">Sudah punya akun? Login</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="container">

<!-- 1. TAMBAH DATA -->
<div class="card2">
<h3>Tambah Data</h3>
<input id="produk" placeholder="Produk">
<input id="modal" type="number" placeholder="Modal">
<input id="jual" type="number" placeholder="Harga Jual">
<button onclick="tambah()">Tambah</button>
</div>

<!-- 2. DATA (TABEL DI TENGAH) -->
<div class="card2">
<h3>Data</h3>
<table>
<thead>
<tr>
<th>Produk</th>
<th>Modal</th>
<th>Jual</th>
<th>Profit</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<!-- 3. TOTAL PROFIT -->
<div class="card2">
<h3>Total Profit</h3>
<div id="total">Rp 0</div>
<canvas id="chart"></canvas>
</div>

<!-- 4. LOGOUT -->
<div class="card2">
<button onclick="logout()">Logout</button>
</div>

</div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA3p6fCg-TI75gUAWFO33intKRPqXitNr8",
  authDomain:"daftarjb.firebaseapp.com",
  projectId:"daftarjb"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let uid=null,chart,unsub=null;

function toast(msg){
  let t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function showRegister(){loginPage.classList.add('hidden');registerPage.classList.remove('hidden')}
function showLogin(){registerPage.classList.add('hidden');loginPage.classList.remove('hidden')}

function register(){
  auth.createUserWithEmailAndPassword(emailReg.value,passReg.value)
  .then(()=>toast('Register berhasil'))
  .catch(e=>toast(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,pass.value)
  .then(()=>toast('Login berhasil'))
  .catch(e=>toast(e.message));
}

function logout(){auth.signOut();toast('Logout')}

auth.onAuthStateChanged(user=>{
  if(user){
    uid=user.uid;
    loginPage.classList.add('hidden');
    registerPage.classList.add('hidden');
    app.classList.remove('hidden');
    loadData();
  }else{
    loginPage.classList.remove('hidden');
    app.classList.add('hidden');
  }
});

function tambah(){
  if(!produk.value||!modal.value||!jual.value){toast('Isi semua');return}
  db.collection('jb').add({uid,produk:produk.value,modal:+modal.value,jual:+jual.value});
  produk.value=modal.value=jual.value="";
}

function loadData(){
  if(unsub)unsub();
  unsub=db.collection('jb').where('uid','==',uid).onSnapshot(res=>{
    list.innerHTML="";
    let totalProfit=0,profits=[];

    res.forEach(doc=>{
      let d=doc.data();
      let profit=d.jual-d.modal;
      totalProfit+=profit;
      profits.push(profit);

      list.innerHTML+=`<tr>
      <td>${d.produk}</td>
      <td>${d.modal}</td>
      <td>${d.jual}</td>
      <td class="profit">Rp ${profit}</td>
      </tr>`;
    });

    document.getElementById('total').innerText="Rp "+totalProfit;
    renderChart(profits);
  });
}

function renderChart(data){
  const ctx=document.getElementById('chart');
  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:'line',data:{labels:data.map((_,i)=>i+1),datasets:[{data,fill:true,tension:0.4}]},options:{plugins:{legend:{display:false}}}});
}
</script>

</body>
</html>
